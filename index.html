document.addEventListener('DOMContentLoaded', async function() {
  const loading = document.getElementById('__bundler_loading');
  function setStatus(msg) { if (loading) loading.textContent = msg; }

  // Error sink persists across replaceWith since it's on window, not the DOM.
  window.addEventListener('error', function(e) {
    var p = document.body || document.documentElement;
    var d = document.getElementById('__bundler_err') || p.appendChild(document.createElement('div'));
    d.id = '__bundler_err';
    d.style.cssText = 'position:fixed;bottom:12px;left:12px;right:12px;font:12px/1.4 ui-monospace,monospace;background:#2a1215;color:#ff8a80;padding:10px 14px;border-radius:8px;border:1px solid #5c2b2e;z-index:99999;white-space:pre-wrap;max-height:40vh;overflow:auto';
    d.textContent = (d.textContent ? d.textContent + String.fromCharCode(10) : '') +
      '[bundle] ' + (e.message || e.type) +
      (e.filename ? ' (' + e.filename.slice(0, 60) + ':' + e.lineno + ')' : '');
  }, true);

  try {
    const manifestEl = document.querySelector('script[type="__bundler/manifest"]');
    const templateEl = document.querySelector('script[type="__bundler/template"]');
    if (!manifestEl || !templateEl) {
      setStatus('Error: missing bundle data');
      console.error('[bundler] Missing script tags — manifestEl:', !!manifestEl, 'templateEl:', !!templateEl);
      return;
    }

    const manifest = JSON.parse(manifestEl.textContent);
    let template = JSON.parse(templateEl.textContent);

    const uuids = Object.keys(manifest);
    setStatus('Unpacking ' + uuids.length + ' assets...');

    const blobUrls = {};
    await Promise.all(uuids.map(async (uuid) => {
      const entry = manifest[uuid];
      try {
        const binaryStr = atob(entry.data);
        const bytes = new Uint8Array(binaryStr.length);
        for (let i = 0; i < binaryStr.length; i++) bytes[i] = binaryStr.charCodeAt(i);

        let finalBytes = bytes;
        if (entry.compressed) {
          if (typeof DecompressionStream !== 'undefined') {
            const ds = new DecompressionStream('gzip');
            const writer = ds.writable.getWriter();
            const reader = ds.readable.getReader();
            writer.write(bytes);
            writer.close();
            const chunks = [];
            let totalLen = 0;
            while (true) {
              const { done, value } = await reader.read();
              if (done) break;
              chunks.push(value);
              totalLen += value.length;
            }
            finalBytes = new Uint8Array(totalLen);
            let offset = 0;
            for (const chunk of chunks) { finalBytes.set(chunk, offset); offset += chunk.length; }
          } else {
            console.warn('DecompressionStream not available, asset ' + uuid + ' may not render');
          }
        }

        blobUrls[uuid] = URL.createObjectURL(new Blob([finalBytes], { type: entry.mime }));
      } catch (err) {
        console.error('Failed to decode asset ' + uuid + ':', err);
        blobUrls[uuid] = URL.createObjectURL(new Blob([], { type: entry.mime }));
      }
    }));

    const extResEl = document.querySelector('script[type="__bundler/ext_resources"]');
    const extResources = extResEl ? JSON.parse(extResEl.textContent) : [];
    const resourceMap = {};
    for (const entry of extResources) {
      if (blobUrls[entry.uuid]) resourceMap[entry.id] = blobUrls[entry.uuid];
    }

    setStatus('Rendering...');
    for (const uuid of uuids) template = template.split(uuid).join(blobUrls[uuid]);

    // Strip integrity + crossorigin — blob URLs from a file:// document inherit
    // a null origin, so crossorigin forces a CORS fetch that SRI then rejects.
    // The manifest bytes are ours; SRI protects against CDN compromise, not this.
    template = template.replace(/\s+integrity="[^"]*"/gi, '').replace(/\s+crossorigin="[^"]*"/gi, '');

    const resourceScript = '<script>window.__resources = ' +
      JSON.stringify(resourceMap).split('</' + 'script>').join('<\\/' + 'script>') +
      ';</' + 'script>';
    // Inject after <head> so the DOCTYPE stays first; prepending the script
    // would push the parser into quirks mode. DOMParser always emits a <head>
    // (synthesizing one if the source HTML omitted it) but may carry
    // attributes through, so match the full opening tag. slice() rather than
    // replace() keeps us clear of $-pattern substitution in resourceScript.
    const headOpen = template.match(/<head[^>]*>/i);
    if (headOpen) {
      const i = headOpen.index + headOpen[0].length;
      template = template.slice(0, i) + resourceScript + template.slice(i);
    }

    // Parse the template and swap the root element. Scripts inserted via
    // DOMParser/replaceWith are inert per spec — re-create each with
    // createElement so they execute, awaiting onload for src scripts to
    // preserve ordering (React before ReactDOM before Babel before text/babel).
    const doc = new DOMParser().parseFromString(template, 'text/html');
    document.documentElement.replaceWith(doc.documentElement);
    const dead = Array.from(document.scripts);
    for (const old of dead) {
      const s = document.createElement('script');
      for (const a of old.attributes) s.setAttribute(a.name, a.value);
      s.textContent = old.textContent;
      // text/babel scripts with a src: fetch and inline. transformScriptTags
      // does XHR against the src, but blob:null/ from a file:// origin is
      // silently dropped. Inlining makes it a plain inline babel script,
      // which transformScriptTags handles unconditionally.
      if ((s.type === 'text/babel' || s.type === 'text/jsx') && s.src) {
        const r = await fetch(s.src);
        s.textContent = await r.text();
        s.removeAttribute('src');
      }
      const p = s.src ? new Promise(function(r) { s.onload = s.onerror = r; }) : null;
      old.replaceWith(s);
      if (p) await p;
    }
    // Babel standalone auto-transforms type=text/babel on DOMContentLoaded,
    // which fired before we swapped the document. Trigger manually if present.
    if (window.Babel && typeof window.Babel.transformScriptTags === 'function') {
      window.Babel.transformScriptTags();
    }
  } catch (err) {
    setStatus('Error unpacking: ' + err.message);
    console.error('Bundle unpack error:', err);
  }
});

00e9tection de fautes \u00b7 fautes inject\u00e9es',\n    sec_work:'Projets s\u00e9lectionn\u00e9s', sec_path:'Exp\u00e9rience & parcours',\n    sec_skills:'Comp\u00e9tences & outils', sec_certs:'Certifications',\n    p1_title:'CI\u002FCD GitOps sur Azure', p1_date:'D\u00e9c. 2025',\n    p1_desc:\"D\u00e9ploiement d'une architecture microservices Angular \u002F Spring Boot \u002F MySQL sur AKS avec un pipeline CI\u002FCD automatis\u00e9 via Azure DevOps et synchronisation GitOps par ArgoCD \u2014 packaging Helm, gestion des images ACR, valid\u00e9 \u00e0 95 % de r\u00e9ussite et ~5 min par d\u00e9ploiement.\",\n    p2_title:'SD-WAN \u002F SASE avec FortiGate & AWS', p2_date:'Oct. 2025',\n    p2_desc:\"Mise en place d'une architecture hub-and-spoke avec FortiGate comme hub central s\u00e9curis\u00e9 et tunnels VPN IPsec, et livraison d'une application de messagerie chiffr\u00e9e (RSA-4096, AES-256-GCM) \u00e0 travers des services de s\u00e9curit\u00e9 multicouches \u2014 IPS, filtrage web et sandboxing.\",\n    p3_title:'Serveur web Nginx conteneuris\u00e9', p3_date:'Avr. 2024',\n    p3_desc:\"Cr\u00e9ation d'un Dockerfile et d'une configuration nginx pour servir des pages HTML avec routage par pays, volumes persistants et mapping des ports.\",\n    e0_role:\"Ing\u00e9nieure DevOps & SRE \u2014 Stage de Fin d'\u00c9tudes (PFE)\", e0_date:'F\u00e9vr. \u2013 Juin 2026',\n    e0_proj:\"Plateforme d'observabilit\u00e9 IA avec analyse de cause racine par LLM\",\n    e0_desc:\"Conception et mise en production (juin 2026) d'une plateforme d'observabilit\u00e9 unifi\u00e9e \u2014 m\u00e9triques, logs et traces \u2014 dot\u00e9e d'un moteur d'analyse de cause racine pilot\u00e9 par LLM. Automatisation compl\u00e8te de l'infrastructure : Terraform sur AWS, Ansible (16 r\u00f4les), tracing distribu\u00e9 OpenTelemetry \u002F Jaeger et serveurs MCP exposant la t\u00e9l\u00e9m\u00e9trie en temps r\u00e9el au mod\u00e8le. Latence m\u00e9diane de diagnostic r\u00e9duite de ~5 min \u00e0 38 s, qualit\u00e9 RCA 0,81\u002F1 et 100 % de rappel de d\u00e9tection sur fautes inject\u00e9es, sur 900+ tests automatis\u00e9s.\",\n    e1_role:'Ing\u00e9nieure DevOps', e1_date:'Mars \u2013 Juil. 2025',\n    e1_desc:\"Automatisation du d\u00e9ploiement CI\u002FCD de l'application Android Snotifier avec AWS (CodePipeline, CodeBuild, S3, IAM) et Fastlane \u2014 s\u00e9curisation des identifiants avec Secrets Manager, rollback via S3 et infrastructure \u00e9volutive d\u00e9finie avec Terraform.\",\n    e2_role:'Stagiaire Cloud & DevOps', e2_date:'Juil. \u2013 Ao\u00fbt 2024',\n    e2_desc:\"Exploration des services AWS de base (Lambda, SQS, SNS), prise en main des workflows d'automatisation cloud et assistance sur les concepts de conteneurisation et les pipelines de d\u00e9ploiement.\",\n    lead_role:'Responsable Formation \u2014 Zero Day Club', lead_date:'Sept. 2024 \u2013 Pr\u00e9sent',\n    lead_desc:\"Animation d'ateliers sur la s\u00e9curit\u00e9 cloud, les r\u00e9seaux et les pratiques DevOps ; encadrement d'une \u00e9quipe de 5 \u00e9tudiants sur un projet de s\u00e9curit\u00e9 cloud.\",\n    edu1_title:\"Ing\u00e9nieure d'\u00c9tat \u2014 R\u00e9seaux & T\u00e9l\u00e9communications\", edu1_date:'2021 \u2013 2026',\n    edu2_title:'Baccalaur\u00e9at \u2014 Sciences Math\u00e9matiques', edu2_date:'2019',\n    sk_cloud:'Cloud & DevOps', sk_prog:'Programmation & scripting', sk_sys:'Syst\u00e8mes & infrastructure',\n    sk_net:'R\u00e9seau & s\u00e9curit\u00e9', sk_vcs:'Gestion de versions', sk_tools:'Design & docs',\n    status_done:'Compl\u00e9t\u00e9', status_prog:'En cours',\n    contact_h:'Gardons la prod sereine, ensemble.',\n    contact_sub:'Ouverte aux postes juniors et jeune dipl\u00f4m\u00e9e SRE \u002F DevOps. Le plus rapide pour me joindre :',\n    lang_h:'Langues',\n    lng_ar:'Arabe \u2014 Langue maternelle', lng_fr:'Fran\u00e7ais \u2014 Avanc\u00e9', lng_en:'Anglais \u2014 C2 certifi\u00e9',\n    lng_es:'Espagnol \u2014 A1', lng_zh:'Mandarin \u2014 A1',\n    footer:'Con\u00e7u & d\u00e9velopp\u00e9 avec soin \u00b7 2026'\n  };\n\n  phrases = {\n    en: ['kubectl get pods -A   # all green', 'terraform apply -auto-approve', 'watching the dashboards so you don\\u2019t have to'],\n    fr: ['kubectl get pods -A   # tout est vert', 'terraform apply -auto-approve', 'je surveille les dashboards pour vous']\n  };\n\n  setRoot = (el) => { this.rootEl = el; };\n  setTyped = (el) => { this.typedEl = el; };\n  setEnBtn = (el) => { this.enBtn = el; };\n  setFrBtn = (el) => { this.frBtn = el; };\n  setThemeBtn = (el) => { this.themeBtn = el; };\n\n  onEn = () => this.setLang('en');\n  onFr = () => this.setLang('fr');\n  onTheme = () => this.applyTheme(this.state.theme === 'dark' ? 'light' : 'dark');\n\n  componentDidMount() {\n    this.mounted = true;\n    \u002F\u002F cache original (EN) text for every translatable node\n    if (this.rootEl) {\n      this.i18nEls = [...this.rootEl.querySelectorAll('[data-i18n]')].map(el => ({\n        el, key: el.getAttribute('data-i18n'), en: el.textContent\n      }));\n      this.setupReveal();\n    }\n    this.updateToggleUI();\n    this.startTyping();\n  }\n\n  componentWillUnmount() {\n    this.mounted = false;\n    clearTimeout(this.typeTimer);\n    if (this.io) this.io.disconnect();\n  }\n\n  setupReveal() {\n    const els = [...this.rootEl.querySelectorAll('[data-reveal]')];\n    els.forEach((el, i) => {\n      el.style.opacity = '0';\n      el.style.transform = 'translateY(16px)';\n      el.style.transition = 'opacity .7s ease, transform .7s ease';\n    });\n    this.io = new IntersectionObserver((entries) => {\n      entries.forEach(e => {\n        if (e.isIntersecting) {\n          e.target.style.opacity = '1';\n          e.target.style.transform = 'translateY(0)';\n          this.io.unobserve(e.target);\n        }\n      });\n    }, { threshold: 0.12, rootMargin: '0px 0px -8% 0px' });\n    els.forEach(el => this.io.observe(el));\n  }\n\n  setLang(lang) {\n    if (lang === this.state.lang) return;\n    this.setState({ lang });\n    const dict = lang === 'fr' ? this.fr : null;\n    (this.i18nEls || []).forEach(({ el, key, en }) => {\n      el.textContent = dict ? (dict[key] != null ? dict[key] : en) : en;\n    });\n    try { document.documentElement.lang = lang; } catch (e) {}\n    this.typeIndex = 0;\n    this.updateToggleUI();\n  }\n\n  applyTheme(theme) {\n    this.setState({ theme });\n    const t = this.themes[theme];\n    if (this.rootEl) for (const k in t) this.rootEl.style.setProperty(k, t[k]);\n    this.updateToggleUI();\n  }\n\n  updateToggleUI() {\n    const lang = this.state.lang, theme = this.state.theme;\n    const setBtn = (btn, active) => {\n      if (!btn) return;\n      btn.style.background = active ? 'var(--accent)' : 'transparent';\n      btn.style.color = active ? 'var(--accent-ink)' : 'var(--text-soft)';\n    };\n    setBtn(this.enBtn, lang === 'en');\n    setBtn(this.frBtn, lang === 'fr');\n    if (this.themeBtn) this.themeBtn.innerHTML = theme === 'dark' ? '\\u263E' : '\\u2600';\n  }\n\n  startTyping() {\n    this.typeIndex = 0;\n    this.charPos = 0;\n    this.deleting = false;\n    const tick = () => {\n      if (!this.mounted || !this.typedEl) return;\n      const arr = this.phrases[this.state.lang] || this.phrases.en;\n      const full = arr[this.typeIndex % arr.length];\n      if (!this.deleting) {\n        this.charPos++;\n        this.typedEl.textContent = full.slice(0, this.charPos);\n        if (this.charPos >= full.length) {\n          this.deleting = true;\n          this.typeTimer = setTimeout(tick, 1900);\n          return;\n        }\n        this.typeTimer = setTimeout(tick, 52 + Math.random() * 50);\n      } else {\n        this.charPos -= 2;\n        if (this.charPos <= 0) {\n          this.charPos = 0;\n          this.deleting = false;\n          this.typeIndex++;\n          this.typedEl.textContent = '';\n          this.typeTimer = setTimeout(tick, 240);\n          return;\n        }\n        this.typedEl.textContent = full.slice(0, this.charPos);\n        this.typeTimer = setTimeout(tick, 28);\n      }\n    };\n    this.typeTimer = setTimeout(tick, 600);\n  }\n\n  renderVals() {\n    return {\n      setRoot: this.setRoot, setTyped: this.setTyped,\n      setEnBtn: this.setEnBtn, setFrBtn: this.setFrBtn, setThemeBtn: this.setThemeBtn,\n      onEn: this.onEn, onFr: this.onFr, onTheme: this.onTheme\n    };\n  }\n}\n<\u002Fscript>\n\n\n<\u002Fbody><\u002Fhtml>"
  </script>
